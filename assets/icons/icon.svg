  <path d="M196 250c44-34 96-34 150-8l-26 44c-34-16-66-16-96 4l40 78 60 6-8 46-92-10a26 26 0 0 1-22-15z"
        fill="#ffffff"/>
  <!-- wheel -->
  <circle cx="318" cy="372" r="58" fill="none" stroke="#ffffff" stroke-width="16"/>
  <circle cx="318" cy="372" r="10" fill="#ffffff"/>
</svg>
