<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Help Mobility">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12909b"/>
      <stop offset="1" stop-color="#0a5c64"/>
    </linearGradient>
  </defs>
  <!-- maskable safe background fills full canvas -->
  <rect width="512" height="512" rx="112" fill="url(#g)"/>
  <!-- motion swoosh -->
  <path d="M96 372c70-26 120-26 190 0" fill="none" stroke="#f08c00" stroke-width="22" stroke-linecap="round" opacity="0.95"/>
  <!-- stylized 'person in motion' mark -->
