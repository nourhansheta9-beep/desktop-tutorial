# Netlify configuration for the Help Mobility static site.
# Deploy: connect this repo in Netlify and set the base directory to "website",
# or drag the website/ folder into the Netlify dashboard.

[build]
  publish = "."
  command = ""   # static site — no build step

# Long-cache static assets (CSS/JS/images), but always revalidate HTML.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Nice URLs: /funding -> funding.html
[[redirects]]
  from = "/funding"
  to = "/funding.html"
  status = 200
[[redirects]]
  from = "/products"
  to = "/products.html"
  status = 200
[[redirects]]
  from = "/rentals"
  to = "/rentals.html"
  status = 200
[[redirects]]
  from = "/service"
  to = "/service.html"
  status = 200
[[redirects]]
  from = "/resources"
  to = "/resources.html"
  status = 200

# Forms: Netlify auto-detects forms with the `netlify` attribute.
# Optional: set up an email notification in Netlify > Forms > Notifications.
