name: Deploy storefront to GitHub Pages

# Publishes the static storefront to GitHub Pages.
# Runs automatically when changes land on the default branch, and can be
# triggered manually from the Actions tab. `enablement: true` turns on Pages
# for the repo on the first run, so no manual settings toggle is needed.

on:
  push:
    branches: [main, claude/beautiful-turing-6hE6N]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
